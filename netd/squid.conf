# netd — allowlist-only forward proxy for the claude-box egress door.
# Contract: ../NETD.md. This is the REFERENCE config (unverified here — needs a
# running squid). It enforces a DESTINATION allowlist with NO TLS interception
# (CONNECT tunnel to allowed hosts only) and FAILS CLOSED.
#
# Topology: the box has --network=none and reaches this proxy only through the
# unix-socket door. squid listens on TCP; a socat bridge fronts the door:
#   socat UNIX-LISTEN:/run/netd.sock,fork,reuseaddr TCP:127.0.0.1:3128
# (in-box, the image entrypoint relays loopback:3128 → /run/netd.sock).

http_port 3128

# Only reachable via the door relay, so "source" is that relay.
acl box src all

# ── The allowlist ────────────────────────────────────────────────────────────
# DEFAULT PROFILE: anthropic only — the model API + OAuth, nothing else.
acl ok_default dstdomain api.anthropic.com .anthropic.com

# Opt-in workload profiles (GH-6 hygiene: FETCH hosts ONLY — never a write API
# like api.github.com, gists, pastebins, or generic upload/object sinks, or the
# door becomes an exfil channel). Uncomment per launch profile, never by default.
# acl ok_js    dstdomain registry.npmjs.org .npmjs.org
# acl ok_clone dstdomain github.com codeload.github.com objects.githubusercontent.com
# acl ok_py    dstdomain pypi.org files.pythonhosted.org

# ── No MITM: tunnel CONNECT to 443 (and plain 80) on allowed domains only ─────
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

http_access allow box ok_default
# http_access allow box ok_js
# http_access allow box ok_clone
# http_access allow box ok_py
http_access deny all            # ← fail closed: anything not allowed above is refused

# ── Audit: log every decision (host + ALLOW/DENY) ────────────────────────────
access_log stdio:/var/log/squid/access.log squid

# Policy gate, not a cache.
cache deny all
